name: Apply Codex Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: |
          if [ ! -f codex-update.patch ]; then
            echo "No patch to apply"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git apply --3way codex-update.patch
          rm codex-update.patch .github/workflows/apply-codex-update.yml
          git add app.js index.html sw.js codex-update.patch .github/workflows/apply-codex-update.yml
          git commit -m "Add payment deletion and monthly dashboard"
          git push
