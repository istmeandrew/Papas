name: Apply Codex Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: |
          git apply codex-update.patch
          rm codex-update.patch .github/workflows/apply-codex-update.yml
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js sw.js codex-update.patch .github/workflows/apply-codex-update.yml
          git commit -m "Use real entry time for movements"
          git push
